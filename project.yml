name: UniLife360
options:
  bundleIdPrefix: com.unilife360
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  UniLife360:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UniLife360
        excludes:
          - "**/*.xcassets/*/Contents.json"
    resources:
      - path: UniLife360/Resources/Assets.xcassets
      - path: UniLife360/Resources/Fonts
        buildPhase: resources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "UniLife 360"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        INFOPLIST_KEY_NSCameraUsageDescription: "UniLife 360 utilise la caméra pour scanner tes tickets de caisse"
        INFOPLIST_KEY_NSCalendarsUsageDescription: "UniLife 360 synchronise ton emploi du temps avec ton calendrier"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "UniLife 360 utilise ta photothèque pour ton avatar"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.unilife360.app
        PRODUCT_NAME: "UniLife 360"
        INFOPLIST_KEY_CFBundleURLTypes: |
          <array>
            <dict>
              <key>CFBundleURLName</key>
              <string>com.unilife360.app</string>
              <key>CFBundleURLSchemes</key>
              <array>
                <string>com.unilife360.app</string>
              </array>
            </dict>
          </array>
    entitlements:
      path: UniLife360/UniLife360.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Supabase
        product: Supabase

  UniLife360Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UniLife360Tests
    dependencies:
      - target: UniLife360
